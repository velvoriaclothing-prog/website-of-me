services:
  - type: web
    name: gamers-arena
    runtime: node
    rootDir: "website of me/Documents"
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECONDARY_PASSWORD
        sync: false
      - key: STORE_PATH
        value: /var/data/store.json
    disk:
      name: gamers-arena-data
      mountPath: /var/data
      sizeGB: 1
