<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment | Gamers Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="payment">
  <div class="shell">
    <nav class="topbar">
      <a class="brand" href="/payment.html">
        <span class="brand-mark">GA</span>
        <span><strong>Gamers Arena</strong><br><small>payment</small></span>
      </a>
      <div class="nav-actions">
        <span class="muted" data-user-label>Player</span>
        <button class="button button-secondary" type="button" data-logout-button>Logout</button>
      </div>
    </nav>

    <section class="hero">
      <p class="eyebrow">step 2</p>
      <h1>Complete your &#8377;<span id="paymentPrice">20</span> payment</h1>
      <p class="hero-copy">Scan the QR code, then tap the button below to save your payment request and open Telegram.</p>
    </section>

    <main class="two-column">
      <section class="panel stack">
        <img id="paymentQr" class="detail-image" src="/assets/payment-qr.jpeg" alt="Payment QR">
        <button id="paymentButton" class="button button-primary button-block" type="button">I Have Paid</button>
        <p id="paymentStatus" class="status-text"></p>
      </section>

      <section class="panel stack">
        <div>
          <p class="eyebrow">next step</p>
          <h2>What happens next</h2>
        </div>
        <p class="hero-copy">After admin approval, this page will move you automatically to the key activation page.</p>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
