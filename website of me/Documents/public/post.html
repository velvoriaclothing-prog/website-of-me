<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post | Gamers Arena</title>
  <meta name="description" content="Read detailed Gamers Arena blog posts with rankings, buyer guides, performance advice, and practical game recommendations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.min.css">
</head>
<body data-page="post">
  <div class="shell">
    <nav class="topbar">
      <a class="brand" href="/"><span class="brand-mark">GA</span><span><strong data-site-title>Gamers Arena</strong><br><small class="muted">post</small></span></a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/blog.html">Blog</a>
      </div>
      <div class="nav-actions">
        <span class="muted" data-user-label>Guest</span>
        <button class="btn btn-secondary" type="button" data-auth-action>Login</button>
      </div>
    </nav>

    <main class="panel post-shell">
      <p class="eyebrow">blog post</p>
      <h1 id="postTitle" class="section-title"></h1>
      <p id="postSummary" class="hero-copy"></p>
      <div id="postMetaBar" class="chip-row post-meta-row"></div>
      <div id="postKeywordList" class="chip-row post-keywords"></div>
      <img id="postImage" class="hidden post-image" alt="Post image">
      <article id="postContent" class="post-article"></article>
      <section class="panel" style="margin-top:28px;">
        <div class="section-head">
          <div>
            <p class="eyebrow">related reading</p>
            <h2 class="section-title">More Guides From Gamers Arena</h2>
          </div>
          <a class="btn btn-secondary" href="/blog">Open Blog Library</a>
        </div>
        <div id="relatedPosts" class="feature-grid"></div>
      </section>
    </main>
  </div>
  <script src="/mobile-nav.min.js"></script>
  <script src="/header-scroll.min.js"></script>
  <script src="/app.min.js"></script>
</body>
</html>
