<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">

<body data-page="blog">

    <nav class="topbar">
      <a class="brand" href="/"><span class="brand-mark">GA</span><span><strong data-site-title>Gamers Arena</strong><br><small class="muted">blog</small></span></a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
