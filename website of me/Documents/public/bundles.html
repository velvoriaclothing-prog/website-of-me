<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bundles | Gamers Arena</title>
  <meta name="description" content="Browse all premium game bundles on Gamers Arena with pricing, bundle sizes, and direct checkout-ready pages.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">

<body data-page="bundles">
  <div class="shell">
    <nav class="topbar">
      <a class="brand" href="/"><span class="brand-mark">GA</span><span><strong data-site-title>Gamers Arena</strong><br><small class="muted">bundle catalog</small></span></a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>

    <main class="panel">
      <div class="section-head">
