<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Key | Gamers Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="enter-key">
  <div class="shell">
    <nav class="topbar">
      <a class="brand" href="/enter-key.html">
        <span class="brand-mark">GA</span>
        <span><strong>Gamers Arena</strong><br><small>key activation</small></span>
      </a>
      <div class="nav-actions">
        <span class="muted" data-user-label>Player</span>
        <button class="button button-secondary" type="button" data-logout-button>Logout</button>
      </div>
    </nav>

    <section class="hero">
      <p class="eyebrow">step 3</p>
      <h1>Enter your access key</h1>
      <p class="hero-copy">Use the one-time key shared by admin after your payment is approved.</p>
    </section>

    <main class="two-column">
      <section class="panel stack">
        <form id="activationForm" class="stack">
          <label class="field">
            <span>Access Key</span>
            <input id="activationKey" class="input" placeholder="EXAMPLE-KEY-HERE">
          </label>
          <button id="activateButton" class="button button-primary button-block" type="submit">Activate Key</button>
        </form>
        <p id="activationStatus" class="status-text"></p>
      </section>

      <section class="panel stack">
        <div>
          <p class="eyebrow">final step</p>
          <h2>After activation</h2>
        </div>
        <p class="hero-copy">A valid key unlocks your access permanently and sends you straight to the PC games page.</p>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
