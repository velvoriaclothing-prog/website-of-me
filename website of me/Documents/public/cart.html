<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Gamers Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="cart">
  <div class="shell">
    <nav class="topbar">
      <a class="brand" href="/"><span class="brand-mark">GA</span><span><strong data-site-title>Gamers Arena</strong><br><small class="muted">cart</small></span></a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link active" data-nav-link="cart" href="/cart.html">Cart</a>
        <a class="nav-link" href="/checkout.html">Checkout</a>
        <a class="nav-link" href="/chat.html">Support</a>
      </div>
      <div class="nav-actions">
        <span class="muted" data-user-label>Guest</span>
        <button class="btn btn-secondary" type="button" data-auth-action>Login</button>
      </div>
    </nav>

    <main class="cart-layout">
      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">cart</p>
            <h1 id="managedCartTitle" class="section-title">Your Cart</h1>
          </div>
        </div>
        <p id="managedCartDescription" class="hero-copy">Review saved games and bundles before continuing to checkout.</p>
        <div id="cartItems" class="list"></div>
      </section>

      <aside class="panel">
        <h2 class="card-title">Summary</h2>
        <p class="muted">Items in cart: <span data-cart-count>0</span></p>
        <p class="price" id="cartTotal">₹0</p>
        <button id="goCheckoutBtn" class="btn btn-primary" type="button">Continue to QR Payment</button>
        <a class="btn btn-secondary" data-telegram-general href="https://t.me/gamersarena_shop" target="_blank" rel="noreferrer">Need Help On Telegram?</a>
        <p class="footer-note">Before payment, you can ask about availability, delivery, or any query from the support page.</p>
      </aside>
    </main>
  </div>
  <script src="/mobile-nav.js"></script>
  <script src="/header-scroll.js"></script>
  <script src="/app.js"></script>
</body>
</html>
